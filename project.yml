name: SuujiNoHanashi
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "29"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 83VGKGSQUH
targets:
  SuujiNoHanashi:
    type: application
    platform: iOS
    sources:
      - SuujiNoHanashi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.sonosuujinohanashi
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SuujiNoHanashi/Info.plist
    info:
      path: SuujiNoHanashi/Info.plist
      properties:
        CFBundleDisplayName: "その数字のお話"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    scheme:
      testTargets: []
