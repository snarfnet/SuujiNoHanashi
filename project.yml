name: SuujiNoHanashi
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "その数字のお話"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSUserTrackingUsageDescription: "パーソナライズされた広告を表示するために使用します"
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    INFOPLIST_KEY_GADApplicationIdentifier: "ca-app-pub-9404799280370656~9177556018"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 83VGKGSQUH
targets:
  SuujiNoHanashi:
    type: application
    platform: iOS
    sources:
      - SuujiNoHanashi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.sonosuujinohanashi
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: GoogleMobileAds
    scheme:
      testTargets: []
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"
